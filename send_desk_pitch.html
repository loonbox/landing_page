document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t:800;font-size:34px;line-height:1;letter-spacing:-.02em;color:var(--acc);margin-bottom:9px}\n.stat-l{font-weight:700;font-size:13.5px;color:var(--ink);line-height:1.2;margin-bottom:4px}\n.stat-s{font-size:12px;color:var(--ink3);line-height:1.35;font-weight:600;margin-top:auto}\n/* ---- BULLETS ---- */\n.blist{list-style:none;margin:14px 0 26px;padding:0}\n.blist li{position:relative;padding:9px 0 9px 26px;font-size:15.5px;line-height:1.5;color:var(--body);border-top:1px solid var(--line)}\n.blist li:first-child{border-top:none}\n.blist li::before{content:\"\";position:absolute;left:3px;top:16px;width:8px;height:8px;border-radius:50%;background:var(--acc)}\n/* ---- TABLES ---- */\n.ptable{border:1px solid var(--line2);border-radius:7px;overflow:hidden;margin:18px 0 28px}\n.prow{display:grid;border-top:1px solid var(--line);padding:12px 16px;font-size:13.5px;line-height:1.4;color:var(--ink2);gap:12px}\n.prow:first-child{border-top:none}\n.phead{background:var(--ink);color:#cfd5df}\n.phead div{font-weight:700;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase}\n.proj .prow{grid-template-columns:1.7fr 1fr 1fr 1fr 1fr;text-align:center}\n.proj .rlabel{text-align:left;font-weight:600;color:var(--ink)}\n.proj .emph{background:#EFE7DD;font-weight:800;color:var(--ink)}\n.proj .emph .rlabel{font-weight:800}\n.ctable .prow{grid-template-columns:1.5fr .72fr 1.7fr}\n.ctable .c-item{font-weight:700;color:var(--ink)}\n.ctable .c-cost{font-weight:700;color:var(--acc)}\n.ctable .emph{background:#EFE7DD}\n.ctable .emph .c-cost,.ctable .emph .c-item{color:var(--ink)}\n/* ---- WEEKS ---- */\n.week{margin:0 0 22px;padding:18px 0 4px;border-top:2px solid var(--acc);break-inside:avoid}\n.week-top{display:flex;justify-content:space-between;align-items:baseline;gap:16px;margin-bottom:6px;flex-wrap:wrap}\n.week-t{font-family:'Poppins';font-weight:700;font-size:18px;color:var(--ink);margin:0;letter-spacing:-.01em}\n.week-d{font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--acc);white-space:nowrap}\n/* ---- RISKS ---- */\n.risk{display:grid;grid-template-columns:52px 1fr;gap:20px;padding:22px 0;border-top:1px solid var(--line);break-inside:avoid}\n.risk-n{font-family:'Poppins';font-weight:800;font-size:30px;line-height:.85;color:var(--acc)}\n.risk-h{font-family:'Poppins';font-weight:700;font-size:18.5px;color:var(--ink);margin:0 0 9px;line-height:1.25}\n.risk-b{font-size:15px;color:var(--body);margin:0 0 12px;max-width:none}\n.mit{background:#F4F7F4;border-radius:6px;padding:13px 16px}\n.mit-l{display:block;font-weight:800;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--acc);margin-bottom:6px}\n.mit-b{font-size:14px;line-height:1.55;color:var(--ink2);margin:0;max-width:none}\n.outcomes{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:30px 0 10px}\n.out{background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:20px 22px}\n.out-worst{border-top:4px solid var(--clay)}\n.out-best{border-top:4px solid var(--green)}\n.out-l{font-weight:800;font-size:10px;letter-spacing:.13em;text-transform:uppercase;margin-bottom:9px}\n.out-worst .out-l{color:var(--clay)}\n.out-best .out-l{color:var(--green)}\n.out p{font-size:14.5px;line-height:1.55;color:var(--ink);margin:0;max-width:none}\n.out .amt{font-family:'Poppins';font-weight:800;color:var(--ink)}\n/* ---- CLOSE ---- */\n.close-pg{background:var(--ink);color:#fff;padding:90px 72px;min-height:680px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center}\n.close-mark{font-family:'Poppins';font-weight:700;font-size:22px;color:#fff;display:flex;align-items:center;gap:11px;margin-bottom:34px}\n.close-mark .env{width:28px;height:21px;border:2.5px solid var(--green);border-radius:5px;position:relative}\n.close-mark .env::after{content:\"\";position:absolute;left:3px;right:3px;top:3px;height:8px;border-bottom:2.5px solid var(--green)}\n.close-eyebrow{font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--green);margin-bottom:18px}\n.close-h{font-family:'Poppins';font-weight:800;font-size:46px;line-height:1.03;letter-spacing:-.02em;margin:0 0 24px;max-width:16ch}\n.close-pg p{font-size:18px;line-height:1.62;color:#C7CEDA;max-width:56ch;margin:0 0 16px}\n.close-thanks{color:#fff;font-weight:600;margin-top:8px}\n.close-sign{font-family:'Poppins';font-weight:700;font-size:22px;color:#fff;margin:20px 0 0}\n.close-contact{display:flex;gap:26px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.16);padding-top:22px;margin-top:34px;font-family:'Poppins';font-weight:600;font-size:15px;color:var(--green)}\n.close-contact span{color:#8a94a6}\n@media (max-width:680px){\n .stats{grid-template-columns:1fr 1fr}\n .outcomes{grid-template-columns:1fr}\n .tp-title{font-size:50px}.note-h,.close-h{font-size:34px}\n .title-pg,.close-pg{padding:56px 30px}\n .proj .prow{font-size:12px;padding:10px 10px;gap:6px}\n}\n@page{size:8.5in 11in;margin:0}\n@media print{\n html{-webkit-print-color-adjust:exact;print-color-adjust:exact}\n html,body{margin:0;padding:0;background:var(--cream)}\n .print-bg{display:block;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--cream);z-index:-1}\n .doc{max-width:none!important;margin:0!important;padding:0!important}\n .section,.note{padding-left:.8in!important;padding-right:.8in!important}\n .title-pg{width:8.5in;height:11in;padding:1in .9in;break-after:page;overflow:hidden}\n .close-pg{width:8.5in;min-height:11in;padding:1in .9in;break-before:page;overflow:hidden}\n .section,.note{break-before:page}\n .stat,.stats,.risk,.week,.callout,.ptable,.out,.shead{break-inside:avoid}\n .subh,.shead,.shead-t,.week-t,.risk-h{break-after:avoid}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n<main class=\"book\">\n\n<div class=\"print-bg\"><\u002Fdiv>\n<section class=\"title-pg\">\n<div class=\"tp-mark dsp\"><span class=\"env\"><\u002Fspan>senddesk<\u002Fdiv>\n<div class=\"tp-body\">\n<div class=\"tp-eyebrow\">A Business Proposal<\u002Fdiv>\n<h1 class=\"tp-title\">The Send Desk<\u002Fh1>\n<p class=\"tp-sub\">A restaurant marketing business built to generate recurring monthly revenue.<\u002Fp>\n<div class=\"tp-meta\"><div>Prepared by <b>Douglas<\u002Fb><\u002Fdiv><div><b>June 2026<\u002Fb><\u002Fdiv><div><b>senddesk.com<\u002Fb><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"tp-ghost\"><\u002Fdiv><div class=\"tp-ghost2\"><\u002Fdiv>\n<\u002Fsection>\n<div class=\"doc\">\n<section class=\"note acc-green\">\n<div class=\"note-eyebrow\">The Send Desk · A Business Proposal<\u002Fdiv>\n<h2 class=\"note-h\">A note before you read this<\u002Fh2>\n<p class=\"lede\">I know I have come to you with ideas before. Some have worked out, some have not, and you have been patient through all of them. I want to be upfront about that before I ask for your support on this one.<\u002Fp>\n<p>What is different this time is that I have already done the work before asking. The product exists. The marketing materials are built. The technical system is mapped out. The pricing is proven in the market. I am not asking you to believe in an idea — I am asking you to look at a plan that is already in motion.<\u002Fp>\n<p>This document is my honest attempt to show you exactly what I am building, what it will cost, what I expect it to earn, and what the realistic risks are. No hype. No best-case-scenario math. Just the truth about what this business is and what it can become.<\u002Fp>\n<p>I am not asking you to fund it. I am not asking you to do anything except read this and tell me honestly what you think.<\u002Fp>\n<p>Thank you for always being willing to listen.<\u002Fp>\n<div class=\"sign dsp\">— Douglas<\u002Fdiv>\n<\u002Fsection>\n<section class=\"section acc-green\">\n<header class=\"shead\"><div class=\"snum\">01<\u002Fdiv><div><div class=\"shead-k\">The Opportunity<\u002Fdiv><h2 class=\"shead-t\">A real problem, an enormous market<\u002Fh2><\u002Fdiv><\u002Fheader>\n<h3 class=\"subh\">The problem I am solving<\u002Fh3>\n<p>Independent restaurants are one of the hardest businesses in the world to run. Margins are thin, competition is constant, and the owner is usually the chef, the manager, the bookkeeper, and the marketer all at once.<\u002Fp>\n<p>The marketing piece is where most restaurants fall apart. They know they should be emailing their guests. They know they should be texting specials. They know they should be posting on Facebook consistently. But between running the kitchen and managing staff, there is no time to figure it out — let alone do it well.<\u002Fp>\n<p>The result: most independent restaurants have an email list they never use, a Facebook page that gets updated twice a month, and no SMS marketing at all. They are leaving real money on the table every single week because they cannot find the time or expertise to do something about it.<\u002Fp>\n<div class=\"callout\"><p>The average restaurant that implements consistent email marketing sees <span class=\"big\">20–30% of its revenue<\u002Fspan> come from returning guests driven by those campaigns. For a restaurant doing $800,000 a year, that is <span class=\"big\">$160,000–$240,000<\u002Fspan> in revenue that is either captured or lost based on whether someone is doing the marketing.<\u002Fp><\u002Fdiv>\n<h3 class=\"subh\">Why I am the right person to solve it<\u002Fh3>\n<p>I have spent years studying direct response marketing — the kind of marketing that actually makes people take action rather than just look at something. I understand copywriting, email strategy, SMS compliance, and content marketing at a level most small business owners never reach.<\u002Fp>\n<p>I have spent the last several months building a 550-piece restaurant marketing system — 200 emails, 200 Facebook posts, and 150 SMS texts — all written specifically for restaurants. This is not a template I downloaded. I wrote every piece of it. It represents months of work and genuine expertise that restaurant owners cannot replicate on their own.<\u002Fp>\n<p>I am not starting from zero. The product exists, the knowledge is real, and the market is enormous.<\u002Fp>\n<\u002Fsection>\n<section class=\"section acc-green\">\n<header class=\"shead\"><div class=\"snum\">02<\u002Fdiv><div><div class=\"shead-k\">The Business<\u002Fdiv><h2 class=\"shead-t\">One company, three recurring revenue streams<\u002Fh2><\u002Fdiv><\u002Fheader>\n<h3 class=\"subh\">What The Send Desk is<\u002Fh3>\n<p>The Send Desk is a retention marketing company for independent restaurants. We help restaurant owners keep their existing guests coming back through email, SMS, and social media marketing — either by teaching them how to do it themselves or by doing it entirely for them.<\u002Fp>\n<p>The business has three revenue streams that build on each other. Each one feeds the next. Each one generates recurring monthly income.<\u002Fp>\n<h3 class=\"subh\">Revenue Stream 1 — The free lead magnet<\u002Fh3>\n<p>The 550-piece restaurant marketing pack is given away for free in exchange for a restaurant owner's email address. This is not charity — it is the front door to the business. Every restaurant owner who downloads the pack becomes a warm prospect for the Monthly Marketing Playbook and eventually the full service.<\u002Fp>\n<p>The pack is so valuable — it would genuinely sell for $197 — that downloading it creates immediate trust and credibility. We are not cold calling strangers. We are giving something extraordinary to people who need it and building a relationship from that first generous act.<\u002Fp>\n<div class=\"callout\"><p>This is a proven marketing model used by some of the most successful service businesses in the world. Give away the thing that proves you are the expert. Sell the ongoing relationship that applies that expertise to their specific situation.<\u002Fp><\u002Fdiv>\n<h3 class=\"subh\">Revenue Stream 2 — The Monthly Marketing Playbook ($37/month)<\u002Fh3>\n<p>Every month, paid subscribers receive The Send Desk Monthly Marketing Playbook. One focused marketing strategy — chosen based on the season, the restaurant's calendar, and what is actually working right now — written out in full and ready to execute. Not a list of ideas. Not general advice. One specific strategy with the steps to implement it that month.<\u002Fp>\n<p>At $37/month this is less than one table turn for most restaurants. It is an easy yes for a restaurant owner who has looked through the free pack and seen the quality of what we produce. It is also a subscription — meaning the revenue recurs every single month without us doing any additional selling.<\u002Fp>\n<div class=\"stats\"><sc-for list=\"{{stream2}}\" as=\"s\" hint-placeholder-count=\"4\"><div class=\"stat\"><div class=\"stat-n\">{{s.n}}<\u002Fdiv><div class=\"stat-l\">{{s.l}}<\u002Fdiv><div class=\"stat-s\">{{s.s}}<\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n<h3 class=\"subh\">Revenue Stream 3 — The agency retainer ($499/month)<\u002Fh3>\n<p>For restaurant owners who want their email and SMS marketing professionally handled, The Send Desk offers a focused monthly retainer. We write and send their email campaigns, execute their SMS marketing, and build a monthly social media content calendar their team can execute — all for a flat monthly fee.<\u002Fp>\n<p>This is the highest-value service we offer and the most significant revenue per client. At $499/month a restaurant owner gets a dedicated marketing professional handling their most important retention channels for less than the cost of one part-time shift per week.<\u002Fp>\n<ul class=\"blist\"><sc-for list=\"{{agency}}\" as=\"b\" hint-placeholder-count=\"5\"><li>{{b}}<\u002Fli><\u002Fsc-for><\u002Ful>\n<div class=\"stats\"><sc-for list=\"{{stream3}}\" as=\"s\" hint-placeholder-count=\"4\"><div class=\"stat\"><div class=\"stat-n\">{{s.n}}<\u002Fdiv><div class=\"stat-l\">{{s.l}}<\u002Fdiv><div class=\"stat-s\">{{s.s}}<\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n<\u002Fsection>\n<section class=\"section acc-blue\">\n<header class=\"shead\"><div class=\"snum\">03<\u002Fdiv><div><div class=\"shead-k\">Revenue Projections<\u002Fdiv><h2 class=\"shead-t\">Conservative numbers, disciplined growth<\u002Fh2><\u002Fdiv><\u002Fheader>\n<p class=\"lead\">These projections are built on conservative assumptions. I have not assumed viral growth, perfect conversion rates, or anything that requires luck. These are the numbers that come from consistent, disciplined execution of the plan over 12 months.<\u002Fp>\n<h3 class=\"subh\">Conservative scenario — disciplined but modest growth<\u002Fh3>\n<div class=\"ptable proj\"><div class=\"prow phead\"><div class=\"rlabel\">Revenue stream<\u002Fdiv><sc-for list=\"{{cols}}\" as=\"c\" hint-placeholder-count=\"4\"><div>{{c}}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><sc-for list=\"{{consRows}}\" as=\"r\" hint-placeholder-count=\"7\"><div class=\"prow {{r.cls}}\"><div class=\"rlabel\">{{r.label}}<\u002Fdiv><sc-for list=\"{{r.vals}}\" as=\"v\" hint-placeholder-count=\"4\"><div>{{v}}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n<h3 class=\"subh\">Moderate scenario — strong execution and word of mouth<\u002Fh3>\n<div class=\"ptable proj\"><div class=\"prow phead\"><div class=\"rlabel\">Revenue stream<\u002Fdiv><sc-for list=\"{{cols}}\" as=\"c\" hint-placeholder-count=\"4\"><div>{{c}}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><sc-for list=\"{{modRows}}\" as=\"r\" hint-placeholder-count=\"7\"><div class=\"prow {{r.cls}}\"><div class=\"rlabel\">{{r.label}}<\u002Fdiv><sc-for list=\"{{r.vals}}\" as=\"v\" hint-placeholder-count=\"4\"><div>{{v}}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n<div class=\"callout\"><p>The moderate scenario requires <span class=\"big\">175 Monthly Marketing Playbook subscribers<\u002Fspan> and <span class=\"big\">8 agency clients<\u002Fspan> by month 12. That is an average of less than 15 new subscribers per month and less than 1 new agency client per month. These are achievable numbers for a focused operator with a quality product.<\u002Fp><\u002Fdiv>\n<\u002Fsection>\n<section class=\"section acc-blue\">\n<header class=\"shead\"><div class=\"snum\">04<\u002Fdiv><div><div class=\"shead-k\">What This Costs<\u002Fdiv><h2 class=\"shead-t\">Exactly what this costs — nothing hidden<\u002Fh2><\u002Fdiv><\u002Fheader>\n<p class=\"lead\">This is the part most business proposals get wrong — they undersell the cost or hide it in optimistic assumptions. I am not going to do that. Here is exactly what this costs, broken into one-time startup costs and ongoing monthly expenses.<\u002Fp>\n<h3 class=\"subh\">One-time startup costs<\u002Fh3>\n<div class=\"ptable ctable\"><div class=\"prow phead\"><div>Item<\u002Fdiv><div>Cost<\u002Fdiv><div>Notes<\u002Fdiv><\u002Fdiv><sc-for list=\"{{startup}}\" as=\"r\" hint-placeholder-count=\"6\"><div class=\"prow {{r.cls}}\"><div class=\"c-item\">{{r.item}}<\u002Fdiv><div class=\"c-cost\">{{r.cost}}<\u002Fdiv><div>{{r.note}}<\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n<h3 class=\"subh\">Monthly operating costs<\u002Fh3>\n<div class=\"ptable ctable\"><div class=\"prow phead\"><div>Tool<\u002Fdiv><div>Monthly<\u002Fdiv><div>What it does<\u002Fdiv><\u002Fdiv><sc-for list=\"{{monthly}}\" as=\"r\" hint-placeholder-count=\"8\"><div class=\"prow {{r.cls}}\"><div class=\"c-item\">{{r.item}}<\u002Fdiv><div class=\"c-cost\">{{r.cost}}<\u002Fdiv><div>{{r.note}}<\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n<div class=\"callout\"><p>The tool overhead excluding ad spend is <span class=\"big\">under $80/month<\u002Fspan>. Pinterest ads at $15/day add approximately $450/month — but that is the engine that builds the email list and drives subscribers. It is not a sunk cost, it is an investment with a direct return. At a $10 cost per lead and a 5% conversion to paid Playbook, every $450 in ad spend generates roughly 2–3 new subscribers at $37/month — a payback period of under six months per subscriber acquired.<\u002Fp><\u002Fdiv>\n<\u002Fsection>\n<section class=\"section acc-green\">\n<header class=\"shead\"><div class=\"snum\">05<\u002Fdiv><div><div class=\"shead-k\">The Launch Plan<\u002Fdiv><h2 class=\"shead-t\">Ten weeks from today to launch<\u002Fh2><\u002Fdiv><\u002Fheader>\n<p class=\"lead\">The business launches September 1st, 2026. Between now and then, here is exactly what happens each week.<\u002Fp>\n<sc-for list=\"{{weeks}}\" as=\"w\" hint-placeholder-count=\"5\"><div class=\"week acc-green\"><div class=\"week-top\"><h3 class=\"week-t\">{{w.title}}<\u002Fh3><span class=\"week-d\">{{w.dates}}<\u002Fspan><\u002Fdiv><ul class=\"blist\"><sc-for list=\"{{w.items}}\" as=\"it\" hint-placeholder-count=\"5\"><li>{{it}}<\u002Fli><\u002Fsc-for><\u002Ful><\u002Fdiv><\u002Fsc-for>\n<\u002Fsection>\n<section class=\"section acc-clay\">\n<header class=\"shead\"><div class=\"snum\">06<\u002Fdiv><div><div class=\"shead-k\">The Honest Risk Assessment<\u002Fdiv><h2 class=\"shead-t\">An honest look at what could go wrong<\u002Fh2><\u002Fdiv><\u002Fheader>\n<p class=\"lead\">Every business has risks. I am not going to pretend this one does not. Here is what could go wrong and what I have done or will do to manage each risk.<\u002Fp>\n<sc-for list=\"{{risks}}\" as=\"r\" hint-placeholder-count=\"4\"><div class=\"risk\"><div class=\"risk-n\">{{r.n}}<\u002Fdiv><div><h3 class=\"risk-h\">{{r.h}}<\u002Fh3><p class=\"risk-b\">{{r.body}}<\u002Fp><div class=\"mit\"><span class=\"mit-l\">Mitigation<\u002Fspan><p class=\"mit-b\">{{r.mit}}<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsc-for>\n<div class=\"outcomes\"><div class=\"out out-worst\"><div class=\"out-l\">Worst realistic outcome<\u002Fdiv><p>I spend $250 to start and roughly $530/month for six months, learn an enormous amount about running a service business, build skills that are permanently valuable, and decide to stop. Total cost: <span class=\"amt\">approximately $3,430.<\u002Fspan><\u002Fp><\u002Fdiv><div class=\"out out-best\"><div class=\"out-l\">Best realistic outcome<\u002Fdiv><p>A business generating <span class=\"amt\">$8,000–$10,000/month<\u002Fspan> in recurring revenue within 18 months that runs largely on systems I built once.<\u002Fp><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n<section class=\"section acc-green\">\n<header class=\"shead\"><div class=\"snum\">07<\u002Fdiv><div><div class=\"shead-k\">Why Now<\u002Fdiv><h2 class=\"shead-t\">The product exists. The plan is set.<\u002Fh2><\u002Fdiv><\u002Fheader>\n<p>I have been studying marketing for years. I have the knowledge. What I have not done until now is build the actual product and the actual system around that knowledge. I have done that now. The 550-piece marketing pack exists. The email sequences are written. The Monthly Marketing Playbook structure is planned. The client acquisition strategy is mapped out.<\u002Fp>\n<p>The market is not getting less competitive over time. Restaurant owners who need marketing help need it now, this year, not in five years when every agency in the country has figured out this niche. The window where a focused, knowledgeable individual can build a meaningful business in this space before it gets crowded is open right now.<\u002Fp>\n<p>I have done the research. I have built the product. I have mapped the plan. The only thing left is to execute it.<\u002Fp>\n<div class=\"stats\"><sc-for list=\"{{whyStats}}\" as=\"s\" hint-placeholder-count=\"4\"><div class=\"stat\"><div class=\"stat-n\">{{s.n}}<\u002Fdiv><div class=\"stat-l\">{{s.l}}<\u002Fdiv><div class=\"stat-s\">{{s.s}}<\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<section class=\"close-pg\">\n<div class=\"close-mark dsp\"><span class=\"env\"><\u002Fspan>senddesk<\u002Fdiv>\n<div class=\"close-eyebrow\">What I am asking for<\u002Fdiv>\n<h2 class=\"close-h dsp\">Not money. Not sacrifice. Just your belief.<\u002Fh2>\n<p>Just your belief that this is worth trying, and your patience while I build it. I will give you a monthly update on exactly where the numbers stand — subscribers, revenue, hours invested. No surprises, no spin. Just the real picture every month so you can tell me honestly if you think I should keep going.<\u002Fp>\n<p>I think this works. I think it works because I have already built the hardest part — the product and the knowledge — and what remains is the execution of a clear and specific plan.<\u002Fp>\n<p class=\"close-thanks\">Thank you for reading this.<\u002Fp>\n<div class=\"close-sign dsp\">— Douglas<\u002Fdiv>\n<div class=\"close-contact\">The Send Desk<span>·<\u002Fspan>hello@senddesk.com<span>·<\u002Fspan>senddesk.com<\u002Fdiv>\n<\u002Fsection>\n<\u002Fmain>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals(){\n    const mark = rows => rows.map(r => ({...r, cls: r.emph ? 'emph' : ''}));\n    return {\n      cols: ['Month 3','Month 6','Month 9','Month 12'],\n      stream2: [\n        {n:'$37',l:'Monthly price',s:'per subscriber'},\n        {n:'$297',l:'Annual price',s:'saves two months'},\n        {n:'15',l:'Break even',s:'subscribers cover all overhead'},\n        {n:'$3,700',l:'100 subscribers',s:'monthly recurring'}\n      ],\n      stream3: [\n        {n:'$499',l:'Per client',s:'per month'},\n        {n:'$1,497',l:'3 clients',s:'monthly recurring'},\n        {n:'$2,495',l:'5 clients',s:'monthly recurring'},\n        {n:'$4,990',l:'10 clients',s:'monthly recurring'}\n      ],\n      agency: [\n        '2 email campaigns written and sent per month',\n        'Up to 5 SMS messages written and sent per month',\n        'Monthly social media content calendar built for the owner or social manager to execute',\n        'Monthly performance report',\n        'Seasonal strategy and campaign planning'\n      ],\n      consRows: mark([\n        {label:'Playbook subscribers', vals:['10','25','45','75']},\n        {label:'Playbook MRR', vals:['$370','$925','$1,665','$2,775']},\n        {label:'Agency retainer clients', vals:['1','2','3','4']},\n        {label:'Agency retainer MRR', vals:['$499','$998','$1,497','$1,996']},\n        {label:'Total monthly revenue', vals:['$869','$1,923','$3,162','$4,771'], emph:true},\n        {label:'Monthly overhead', vals:['~$530','~$545','~$580','~$625']},\n        {label:'Monthly profit', vals:['~$339','~$1,378','~$2,582','~$4,146'], emph:true}\n      ]),\n      modRows: mark([\n        {label:'Playbook subscribers', vals:['20','60','110','175']},\n        {label:'Playbook MRR', vals:['$740','$2,220','$4,070','$6,475']},\n        {label:'Agency retainer clients', vals:['2','4','6','8']},\n        {label:'Agency retainer MRR', vals:['$998','$1,996','$2,994','$3,992']},\n        {label:'Total monthly revenue', vals:['$1,738','$4,216','$7,064','$10,467'], emph:true},\n        {label:'Monthly overhead', vals:['~$530','~$545','~$580','~$625']},\n        {label:'Monthly profit', vals:['~$1,208','~$3,671','~$6,484','~$9,842'], emph:true}\n      ]),\n      startup: mark([\n        {item:'Michigan LLC filing fee', cost:'$150', note:'One-time; legally protects personal assets'},\n        {item:'Expedited LLC processing', cost:'$100', note:'Done in 24 hours vs 15 business days'},\n        {item:'EIN (Employer ID Number)', cost:'$0', note:'Free through IRS.gov, takes 10 minutes'},\n        {item:'Mercury business bank account', cost:'$0', note:'Free business banking, no minimums'},\n        {item:'Domain (senddesk.com)', cost:'Included', note:'Through Hostinger hosting plan'},\n        {item:'Total one-time investment', cost:'$250', note:'Total to legally launch', emph:true}\n      ]),\n      monthly: mark([\n        {item:'Hostinger (site + domain)', cost:'$3–10', note:'Hosts the website I am building myself'},\n        {item:'Google Workspace', cost:'$6', note:'Professional email — hello@senddesk.com'},\n        {item:'Klaviyo (email)', cost:'Free to start', note:'Captures leads, sends automated sequences'},\n        {item:'Beehiiv (publishing)', cost:'$49', note:'Publishes and charges for the Monthly Playbook'},\n        {item:'Canva (design)', cost:'Free to start', note:'Creates graphics, pins, marketing materials'},\n        {item:'Claude AI subscription', cost:'$20', note:'AI assistant used to build and run the business'},\n        {item:'Pinterest Ads', cost:'~$450', note:'$15/day — drives owners to the free pack'},\n        {item:'Total monthly (at launch)', cost:'~$528–538', note:'Ads are the largest cost — and the growth engine', emph:true}\n      ]),\n      weeks: [\n        {title:'Weeks 1–2 · Legal foundation & brand', dates:'Now — July 8', items:[\n          'File the Michigan LLC and obtain EIN',\n          'Open Mercury business bank account',\n          'Purchase domain and hosting through Hostinger',\n          'Set up Google Workspace and professional email',\n          'Build the website — four pages, clean HTML and CSS',\n          'Create the logo and brand basics in Canva'\n        ]},\n        {title:'Weeks 3–4 · Email system & Playbook setup', dates:'July 9 — July 22', items:[\n          'Set up Klaviyo email capture and automation sequences',\n          'Build the six-email welcome sequence that pitches the Monthly Playbook',\n          'Set up Beehiiv with free and paid Playbook tiers at $37/month',\n          'Write the first full Playbook issue — August edition',\n          'Connect Stripe for payment processing'\n        ]},\n        {title:'Weeks 5–6 · Content & lead-gen prep', dates:'July 23 — August 5', items:[\n          'Create 20 Pinterest pins promoting the free pack and Monthly Playbook',\n          'Join 10–15 Facebook groups where restaurant owners gather',\n          'Begin organic outreach — valuable posts in groups, no selling',\n          'Send personal emails to 50 Grand Rapids restaurant owners',\n          'Set up Pinterest Business account and ad account'\n        ]},\n        {title:'Weeks 7–9 · Soft launch & list building', dates:'August 6 — August 26', items:[\n          'Begin posting in Facebook groups daily — value first, pack offer second',\n          'Send personal outreach emails — 10 per day, five days per week',\n          'Launch Pinterest organic pins — 2 per day on a schedule',\n          'Send first Monthly Playbook issue to early subscribers',\n          'Track every lead source to know what is working before spending on ads'\n        ]},\n        {title:'Week 10 · Official launch', dates:'August 27 — September 1', items:[\n          'Turn on Pinterest ads at $15/day',\n          'Post launch announcement across all Facebook groups simultaneously',\n          'Email entire warm contact list built over the previous 9 weeks',\n          'Begin the agency retainer pitch sequence for Playbook subscribers',\n          'Open for direct client bookings'\n        ]}\n      ],\n      risks: [\n        {n:'01', h:'The Monthly Marketing Playbook does not convert enough subscribers',\n         body:'If restaurant owners download the free pack but do not pay for the Playbook, revenue stalls at stream one with no recurring income.',\n         mit:'The welcome email sequence is specifically designed to convert over 14 days, not immediately. If conversion is low I can adjust the pitch, the price, or the offer without rebuilding the entire business. The free pack itself still generates agency client leads regardless of Playbook conversion.'},\n        {n:'02', h:'Getting agency clients takes longer than projected',\n         body:'The agency retainer requires a longer sales cycle than the Playbook. A restaurant owner needs to trust me before they hand over their marketing.',\n         mit:'Every Playbook subscriber is a warm prospect who receives three retainer pitch emails over 60 days. The trust is built by the Playbook before the pitch is ever made. I am also doing direct outreach to 1,200+ Grand Rapids restaurant owners I have already identified and researched.'},\n        {n:'03', h:'This takes time away from family',\n         body:'I am committing to this full time. That means I am all in — not stealing hours here and there, but treating this as a real job with real hours and real accountability. That is a meaningful change to our daily rhythm and I want to be honest about it rather than minimize it.',\n         mit:'The time is structured, purposeful, and building toward something specific. The 10-week build phase is the most intensive period. Once the system is live — the email sequences, the Playbook, the Pinterest ads — a significant portion of the business runs automatically. I am also committing to boundaries: set work hours, protected family time that does not get negotiated away, and a clear separation between building the business and being present at home. I will not let this consume the house — and I am asking you to hold me to that.'},\n        {n:'04', h:'The business does not work',\n         body:'This is the real one and I am not going to minimize it. Not every business works. Some ideas that look good on paper do not find their market.',\n         mit:'The total investment to find out is $250 one-time and approximately $530/month in overhead — tools, Claude, and Pinterest ads combined. If this is not working by month six I will know from the data and make a clear-eyed decision about whether to continue, adjust, or stop. Total worst-case cost over six months is roughly $3,430 — real money, but a defined and capped risk, not an open-ended one.'}\n      ],\n      whyStats: [\n        {n:'$250',l:'Total startup cost',s:'one-time only'},\n        {n:'$528–538',l:'Monthly overhead',s:'tools + ads at launch'},\n        {n:'15',l:'Break even',s:'Playbook subscribers'},\n        {n:'Sept 1',l:'Launch date',s:'ten weeks away'}\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
